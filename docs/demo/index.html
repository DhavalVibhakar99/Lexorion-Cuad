/* ============================================================

function Badge({ tone, children }: { tone: string; children: React.ReactNode }) {

        <span className="truncate text-xs text-zinc-500">{k.delta}</span>
      </div>
    </div>
  );
}

/* ============================================================
   Charts (Chart.js via refs, theme-aware, range-reactive)
   ============================================================ */

function useChart(build: (ctx: CanvasRenderingContext2D) => any, deps: any[]) {
  const canvasRef = useRef<HTMLCanvasElement>(null);
  const chartRef = useRef<any>(null);
  useEffect(() => {
    if (!canvasRef.current) return;
    chartRef.current?.destroy();
    chartRef.current = new Chart(canvasRef.current.getContext("2d"), build(canvasRef.current.getContext("2d")));
    return () => chartRef.current?.destroy();
  }, deps);
  return canvasRef;
}

function chartTheme(dark: boolean) {
  return {
    grid: dark ? "rgba(255,255,255,0.05)" : "rgba(60,50,30,0.08)",
    ticks: dark ? "#8a8171" : "#6b6250",
    legend: dark ? "#c9c2b4" : "#4a4436",
  };
}

function VolumeChart({ range, dark }: { range: string; dark: boolean }) {
  const t = chartTheme(dark);
  const d = RANGES[range];
  const ref = useChart((ctx) => {
    const gradient = ctx.createLinearGradient(0, 0, 0, 260);
    gradient.addColorStop(0, "rgba(212,149,42,0.28)");
    gradient.addColorStop(1, "rgba(212,149,42,0)");
    return {
      type: "line",
      data: { labels: d.labels, datasets: [
        { label: "Contracts analyzed", data: d.contracts, borderColor: "#d4952a", backgroundColor: gradient,
          fill: true, tension: 0.42, borderWidth: 2.5, pointRadius: 3, pointBackgroundColor: "#d4952a" },
        { label: "LLM escalations", data: d.escalations, borderColor: "#7ec8e3", backgroundColor: "transparent",
          borderDash: [6, 5], tension: 0.42, borderWidth: 2, pointRadius: 3, pointBackgroundColor: "#7ec8e3" },
      ]},
      options: {
        responsive: true, maintainAspectRatio: false,
        plugins: { legend: { labels: { color: t.legend, usePointStyle: true, boxWidth: 7, font: { family: "Inter", size: 11 } } } },
        scales: {
          x: { grid: { color: t.grid }, ticks: { color: t.ticks, font: { size: 11 } } },
          y: { grid: { color: t.grid }, ticks: { color: t.ticks, font: { size: 11 } }, beginAtZero: true },
        },
      },
    };
  }, [range, dark]);
  return <div className="h-64"><canvas ref={ref} /></div>;
}

function RecallChart({ dark, selected, onSelect }: { dark: boolean; selected: string | null; onSelect: (id: string) => void }) {
  const t = chartTheme(dark);
  const ref = useChart(() => ({
    type: "bar",
    data: {
      labels: CATEGORIES.map((c) => c.short),
      datasets: [{
        label: "Screening recall (full test split)",
        data: CATEGORIES.map((c) => c.recall),
        backgroundColor: CATEGORIES.map((c) =>
          selected && c.id !== selected ? "rgba(212,149,42,0.18)" : c.recall >= 0.9 ? "rgba(63,185,80,0.75)" : "rgba(212,149,42,0.8)"),
        borderRadius: 7, borderSkipped: false, maxBarThickness: 34,
      }],
    },
    options: {
      indexAxis: "y", responsive: true, maintainAspectRatio: false,
      onClick: (_evt: any, els: any[]) => { if (els.length) onSelect(CATEGORIES[els[0].index].id); },
      plugins: { legend: { display: false },
        tooltip: { callbacks: { label: (c: any) => ` recall ${(c.raw * 100).toFixed(1)}% — click for details` } } },
      scales: {
        x: { min: 0, max: 1, grid: { color: t.grid }, ticks: { color: t.ticks, font: { size: 11 }, callback: (v: number) => `${v * 100}%` } },
        y: { grid: { display: false }, ticks: { color: t.ticks, font: { size: 11 } } },
      },
    },
  }), [dark, selected]);
  return <div className="h-64"><canvas ref={ref} /></div>;
}

/* ============================================================
   Review queue table with search, category filter, pagination
   ============================================================ */

const PAGE_SIZE = 5;

function QueueTable({ selected, search, onSelectCategory }:
  { selected: string | null; search: string; onSelectCategory: (id: string) => void }) {
  const [page, setPage] = useState(1);
  const rows = useMemo(() => {
    const q = search.trim().toLowerCase();
    return QUEUE.filter((r) =>
      (!selected || r.category === selected) &&
      (!q || r.clause.toLowerCase().includes(q) || r.contract.toLowerCase().includes(q) || r.id.toLowerCase().includes(q)));
  }, [selected, search]);
  const pages = Math.max(1, Math.ceil(rows.length / PAGE_SIZE));
  const safePage = Math.min(page, pages);
  useEffect(() => setPage(1), [selected, search]);

  const statusTone: Record<QueueRow["status"], string> = { Confirmed: "red", "Pending review": "gold", Cleared: "green" };
  const modelTone: Record<QueueRow["model"], string> = { "LLM verified": "blue", Baseline: "zinc", "Weak flag": "gold" };

  return (
    <div>
      <div className="overflow-x-auto">
        <table className="w-full min-w-[760px] text-left text-sm">
          <thead>
            <tr className="border-b border-white/5 text-[11px] uppercase tracking-wider text-zinc-500">
              <th className="py-3 pr-4 font-semibold">Finding</th>
              <th className="py-3 pr-4 font-semibold">Category</th>
              <th className="py-3 pr-4 font-semibold">Clause excerpt</th>
              <th className="py-3 pr-4 font-semibold">Model</th>
              <th className="py-3 pr-4 font-semibold">Conf.</th>
              <th className="py-3 pr-4 font-semibold">Status</th>
              <th className="py-3 font-semibold">When</th>
            </tr>
          </thead>
          <tbody>
            {rows.slice((safePage - 1) * PAGE_SIZE, safePage * PAGE_SIZE).map((r) => {
              const cat = CATEGORIES.find((c) => c.id === r.category)!;
              return (
                <tr key={r.id} className="group border-b border-white/[0.04] transition-colors hover:bg-gold-500/[0.04]">
                  <td className="py-3.5 pr-4">
                    <p className="font-mono text-xs text-gold-400">{r.id}</p>
                    <p className="mt-0.5 text-xs text-zinc-500">{r.contract}</p>
                  </td>
                  <td className="py-3.5 pr-4">
                    <button onClick={() => onSelectCategory(r.category)}
                      className="rounded-md text-xs font-medium text-zinc-300 underline decoration-dotted decoration-zinc-600 underline-offset-4 transition hover:text-gold-300 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60">
                      {cat.icon} {cat.short}
                    </button>
                  </td>
                  <td className="max-w-[280px] truncate py-3.5 pr-4 font-mono text-[12px] text-zinc-500 group-hover:text-zinc-400" title={r.clause}>{r.clause}</td>
                  <td className="py-3.5 pr-4"><Badge tone={modelTone[r.model]}>{r.model}</Badge></td>
                  <td className="py-3.5 pr-4 tabular-nums text-zinc-300">{(r.confidence * 100).toFixed(0)}%</td>
                  <td className="py-3.5 pr-4"><Badge tone={statusTone[r.status]}>{r.status}</Badge></td>
                  <td className="py-3.5 text-xs text-zinc-500">{r.when}</td>
                </tr>
              );
            })}
            {rows.length === 0 && (
              <tr><td colSpan={7} className="py-10 text-center text-sm text-zinc-500">No findings match this filter.</td></tr>
            )}
          </tbody>
        </table>
      </div>
      <div className="mt-4 flex items-center justify-between text-xs text-zinc-500">
        <span>{rows.length} finding{rows.length === 1 ? "" : "s"}{selected ? " · filtered" : ""}</span>
        <div className="flex items-center gap-1.5">
          <button disabled={safePage === 1} onClick={() => setPage(safePage - 1)}
            className="rounded-lg border border-white/10 px-3 py-1.5 transition enabled:hover:border-gold-500/40 enabled:hover:text-gold-300 disabled:opacity-35 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60">Prev</button>
          {Array.from({ length: pages }, (_, i) => (
            <button key={i} onClick={() => setPage(i + 1)}
              className={`h-8 w-8 rounded-lg border text-center transition focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60
                ${safePage === i + 1 ? "border-gold-500/60 bg-gold-500/15 text-gold-300" : "border-white/10 hover:border-gold-500/40 hover:text-gold-300"}`}>{i + 1}</button>
          ))}
          <button disabled={safePage === pages} onClick={() => setPage(safePage + 1)}
            className="rounded-lg border border-white/10 px-3 py-1.5 transition enabled:hover:border-gold-500/40 enabled:hover:text-gold-300 disabled:opacity-35 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60">Next</button>
        </div>
      </div>
    </div>
  );
}

function riskColor(score: number) {
  if (score >= 0.7) return "#e5534b";
  if (score >= 0.4) return "#d4952a";
  return "#3fb950";
}

function FindingCard({ d, onCategory }: { d: any; onCategory: (id: string) => void }) {
  const cat = CATEGORIES.find((c) => c.id === d.risk_category);
  const modelBadge = d.model_used === "llm"
    ? <Badge tone="blue">LLM verified</Badge>
    : d.model_used === "baseline_fallback"
      ? <Badge tone="gold">Weak flag (unreviewed)</Badge>
      : <Badge tone="zinc">Baseline</Badge>;
  return (
    <div className="rounded-xl border border-white/[0.06] bg-white/[0.02] p-4 transition hover:border-gold-500/25">
      <div className="flex flex-wrap items-center gap-2">
        <button onClick={() => onCategory(d.risk_category)}
          className="text-sm font-semibold text-zinc-100 underline decoration-dotted decoration-zinc-600 underline-offset-4 transition hover:text-gold-300 [html:not(.dark)_&]:text-zinc-800">
          {cat ? `${cat.icon} ${cat.name}` : d.risk_category}
        </button>
        {modelBadge}
        <Badge tone={d.risk_level === "high" || d.risk_level === "critical" ? "red" : d.risk_level === "moderate" ? "gold" : "zinc"}>
          {d.risk_level}
        </Badge>
        <span className="ml-auto font-mono text-xs text-zinc-500">{(d.confidence * 100).toFixed(0)}% conf.</span>
      </div>
      {d.summary && <p className="mt-2 text-sm leading-relaxed text-zinc-400">{d.summary}</p>}
      {(d.evidence_terms || []).length > 0 && (
        <div className="mt-2">
          <span className="text-[11px] text-zinc-500">Triggered by: </span>
          {d.evidence_terms.map((t: string) => (
            <span key={t} className="mr-1.5 inline-block rounded-full border border-gold-500/40 bg-gold-500/10 px-2 py-0.5 font-mono text-[11px] text-gold-300">{t}</span>
          ))}
        </div>
      )}
      {d.extracted_clause && (
        <p className="mt-3 max-h-28 overflow-y-auto rounded-lg border border-white/5 bg-black/30 p-3 font-mono text-[11.5px] leading-relaxed text-zinc-500 [html:not(.dark)_&]:bg-amber-100/60 [html:not(.dark)_&]:text-zinc-700">
          {d.extracted_clause}
        </p>
      )}
    </div>
  );
}

function AnalyzeSection({ onCategory }: { onCategory: (id: string) => void }) {
  const [apiUp, setApiUp] = useState<null | boolean>(null);
  const [llmReady, setLlmReady] = useState(false);
  const [text, setText] = useState("");
  const [useLlm, setUseLlm] = useState(true);
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState<string | null>(null);
  const [result, setResult] = useState<any>(null);
  const fileRef = useRef<HTMLInputElement>(null);

  useEffect(() => {
    let cancelled = false;
    fetch(`${API_BASE}/health`).then((r) => r.json()).then((h) => {
      if (!cancelled) { setApiUp(h.status === "ok"); setLlmReady(!!h.llm_ready); }
    }).catch(() => !cancelled && setApiUp(false));
    return () => { cancelled = true; };
  }, []);

  const run = async (fn: () => Promise<Response>) => {
    setBusy(true); setError(null); setResult(null);
    try {
      const res = await fn();
      const body = await res.json();
      if (!res.ok) throw new Error(body.detail || `API error ${res.status}`);
      setResult(body);
    } catch (e: any) {
      setError(e.message === "Failed to fetch"
        ? "Could not reach the analysis service. It may be waking up — try again in a minute."
        : e.message);
    } finally { setBusy(false); }
  };

  const analyzeText = () => run(() =>
    fetch(`${API_BASE}/analyze`, { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text, use_llm: useLlm }) }));

  const analyzePdf = (file: File) => {
    const form = new FormData();
    form.append("file", file);
    run(() => fetch(`${API_BASE}/analyze-pdf?use_llm=${useLlm}`, { method: "POST", body: form }));
  };

  const verdict = useMemo(() => {
    if (!result) return null;
    const elevated = Object.entries(result.risk_scores || {})
      .filter(([, s]: any) => s >= 0.5).sort((a: any, b: any) => b[1] - a[1])
      .map(([c]) => CATEGORIES.find((x) => x.id === c)?.name || c);
    return elevated.length
      ? `Elevated exposure in ${elevated.slice(0, 3).join(", ")}. ${result.flagged_paragraphs} paragraph(s) queued for review.`
      : result.flagged_paragraphs
        ? `No elevated categories — ${result.flagged_paragraphs} weak flag(s) worth a skim.`
        : "No risk clauses detected in this contract.";
  }, [result]);

  return (
    <Card>
      <div className="flex flex-wrap items-start justify-between gap-4">
        <SectionTitle overline="Live analysis" title="Analyze a contract"
          sub="Runs the real pipeline: the recall-first model scores every paragraph, weak flags go to the LLM for triage. Paste text or upload a PDF." />
        <div className="flex items-center gap-2 rounded-lg border border-white/10 px-3 py-1.5 text-xs text-zinc-500">
          <span className={`h-2 w-2 rounded-full ${apiUp === null ? "bg-zinc-500 animate-pulse" : apiUp ? "bg-emerald-400" : "bg-rose-500"}`} />
          {apiUp === null ? "Connecting to analysis service…" : apiUp ? "Analysis service online" : "Analysis service offline"}
        </div>
      </div>

      <textarea value={text} onChange={(e) => setText(e.target.value)} rows={7}
        placeholder="Paste contract text here — or load the sample, or upload a PDF below…"
        className="mt-2 w-full rounded-xl border border-white/10 bg-black/25 p-4 font-mono text-[12.5px] leading-relaxed text-zinc-300 placeholder-zinc-600 transition focus:border-gold-500/50 focus:outline-none focus:ring-2 focus:ring-gold-500/15 [html:not(.dark)_&]:bg-white [html:not(.dark)_&]:text-zinc-700" />

      <div className="mt-3 flex flex-wrap items-center gap-3">
        <button onClick={analyzeText} disabled={busy || !text.trim() || !apiUp}
          className="rounded-xl bg-gradient-to-br from-gold-400 to-gold-600 px-5 py-2.5 text-sm font-bold text-ink-950 shadow-glow transition hover:brightness-110 disabled:cursor-not-allowed disabled:opacity-40 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60">
          {busy ? "Analyzing…" : "Analyze text"}
        </button>
        <button onClick={() => fileRef.current?.click()} disabled={busy || !apiUp}
          className="rounded-xl border border-gold-500/40 px-5 py-2.5 text-sm font-semibold text-gold-300 transition hover:bg-gold-500/10 disabled:opacity-40 focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60">
          Upload PDF
        </button>
        <input ref={fileRef} type="file" accept=".pdf" className="hidden"
          onChange={(e) => { const f = e.target.files?.[0]; if (f) analyzePdf(f); e.target.value = ""; }} />
        <button onClick={() => setText(SAMPLE_CONTRACT)} disabled={busy}
          className="text-xs text-zinc-500 underline decoration-dotted underline-offset-4 transition hover:text-gold-300">
          Load sample contract
        </button>
        <label className="ml-auto flex cursor-pointer items-center gap-2 text-xs text-zinc-400">
          <input type="checkbox" checked={useLlm} onChange={(e) => setUseLlm(e.target.checked)}
            disabled={!llmReady} className="h-3.5 w-3.5 accent-[#d4952a]" />
          LLM triage of weak flags {llmReady ? "" : "(no key on server)"}
        </label>
      </div>

      {busy && (
        <div className="mt-5 flex items-center gap-3 rounded-xl border border-gold-500/20 bg-gold-500/5 p-4 text-sm text-zinc-400">
          <svg className="h-4 w-4 animate-spin text-gold-400" viewBox="0 0 24 24" fill="none"><circle className="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" strokeWidth="4"/><path className="opacity-90" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"/></svg>
          Screening every paragraph locally, escalating weak flags to the LLM…
        </div>
      )}
      {error && (
        <div className="mt-5 rounded-xl border border-rose-500/25 bg-rose-500/5 p-4 text-sm text-rose-300">{error}</div>
      )}

      {result && !busy && (
        <div className="mt-6 space-y-5">
          <div className="rounded-xl border border-gold-500/30 bg-gradient-to-r from-gold-500/10 to-transparent p-4 text-sm font-medium text-zinc-100 [html:not(.dark)_&]:text-zinc-800">
            {verdict}
          </div>

          <div className="grid grid-cols-2 gap-3 sm:grid-cols-4">
            {[
              ["Paragraphs", result.total_paragraphs],
              ["Flagged", result.flagged_paragraphs],
              ["LLM escalations", result.llm_stats?.escalated ?? 0],
              ["Cleared by LLM", result.llm_stats?.cleared_by_llm ?? 0],
            ].map(([label, value]) => (
              <div key={label} className="rounded-xl border border-white/5 bg-white/[0.02] p-3 text-center">
                <p className="text-xl font-bold text-zinc-100 [html:not(.dark)_&]:text-zinc-800">{value}</p>
                <p className="text-[11px] text-zinc-500">{label}</p>
              </div>
            ))}
          </div>

          <div>
            <p className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">Risk exposure by category</p>
            <div className="space-y-1.5">
              {Object.entries(result.risk_scores || {}).sort((a: any, b: any) => b[1] - a[1]).map(([catId, score]: any) => {
                const cat = CATEGORIES.find((c) => c.id === catId);
                return (
                  <div key={catId} className="flex items-center gap-3">
                    <button onClick={() => onCategory(catId)}
                      className="w-44 shrink-0 truncate text-left text-xs text-zinc-400 underline decoration-dotted decoration-transparent underline-offset-4 transition hover:text-gold-300 hover:decoration-zinc-600">
                      {cat ? cat.name : catId}
                    </button>
                    <div className="h-5 flex-1 overflow-hidden rounded-md bg-white/[0.04]">
                      <div className="flex h-full items-center justify-end rounded-md pr-2 font-mono text-[10px] text-ink-950 transition-all duration-700"
                        style={{ width: `${Math.max(score * 100, score > 0 ? 8 : 0)}%`, background: score > 0 ? riskColor(score) : "transparent" }}>
                        {score > 0 ? score.toFixed(2) : ""}
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {(result.detections || []).length > 0 && (
            <div>
              <p className="mb-2 text-[11px] font-semibold uppercase tracking-wider text-zinc-500">
                Findings ({result.detections.length}) — highest confidence first
              </p>
              <div className="space-y-3">
                {result.detections.map((d: any, i: number) => (
                  <FindingCard key={`${d.paragraph_id}-${d.risk_category}-${i}`} d={d} onCategory={onCategory} />
                ))}
              </div>
            </div>
          )}

          {result.llm_stats?.llm_model && (
            <p className="text-[11px] text-zinc-600">
              LLM: {result.llm_stats.llm_model} · est. cost ${Number(result.llm_stats.estimated_cost_usd || 0).toFixed(4)}
              {result.llm_stats.cache_hits ? ` · ${result.llm_stats.cache_hits} from cache` : ""}
              {result.llm_stats.fallbacks ? ` · ${result.llm_stats.fallbacks} weak flag(s) kept unreviewed (budget)` : ""}
            </p>
          )}
        </div>
      )}
    </Card>
  );
}

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    document.body.style.background = dark ? "#0e0d0a" : "#fdf8ee";
    document.body.style.color = dark ? "#d6d0c4" : "#3d382d";
  }, [dark]);

  const refs = { overview: useRef<HTMLDivElement>(null), analyze: useRef<HTMLDivElement>(null),
    queue: useRef<HTMLDivElement>(null), performance: useRef<HTMLDivElement>(null),
    taxonomy: useRef<HTMLDivElement>(null) };
  const goto = useCallback((id: string) => {
    setNav(id);
    refs[id as keyof typeof refs]?.current?.scrollIntoView({ behavior: "smooth", block: "start" });
  }, []);

  const openCategory = (id: string) => { setSelectedCategory(id); setModalCategory(id); };

  return (
    <div className="flex min-h-screen">
      <Sidebar active={nav} onNav={goto} open={menuOpen} onClose={() => setMenuOpen(false)} />
      <div className="min-w-0 flex-1">
        <Header dark={dark} onToggleDark={() => setDark(!dark)} onMenu={() => setMenuOpen(true)}
          search={search} onSearch={setSearch} />

        <main className="mx-auto max-w-7xl space-y-8 px-4 py-8 lg:px-8">

          {/* Overview */}
          <section ref={refs.overview} className="scroll-mt-20">
            <SectionTitle overline="Command center" title="Contract risk at a glance"
              sub="A recall-first local screen reads everything for free; an LLM triages only the weak flags. Numbers below are measured on the CUAD test split." />
            <div className="grid grid-cols-1 gap-4 sm:grid-cols-2 xl:grid-cols-4">
              {KPIS.map((k) => <KpiCard key={k.label} k={k} />)}
            </div>
          </section>

          {/* Live analysis */}
          <section ref={refs.analyze} className="scroll-mt-20">
            <AnalyzeSection onCategory={(id) => setModalCategory(id)} />
          </section>

          {/* Taxonomy chips */}
          <section ref={refs.taxonomy} className="scroll-mt-20">
            <Card>
              <SectionTitle overline="Risk taxonomy" title="8 business categories — click any to understand it"
                sub="Each card explains the category in plain English, shows what the clause looks like in a real contract, and why it costs money. Clicking also filters the review queue." />
              <CategoryChips selected={selectedCategory}
                onSelect={(id) => { setSelectedCategory(id); if (id) setModalCategory(id); }} />
              {selectedCategory && (
                <button onClick={() => setSelectedCategory(null)}
                  className="mt-3 text-xs text-zinc-500 underline decoration-dotted underline-offset-4 transition hover:text-gold-300">
                  Clear filter — showing only {CATEGORIES.find((c) => c.id === selectedCategory)?.name}
                </button>
              )}
            </Card>
          </section>

          {/* Charts */}
          <section ref={refs.performance} className="grid scroll-mt-20 grid-cols-1 gap-4 xl:grid-cols-5">
            <Card className="xl:col-span-3">
              <div className="mb-1 flex items-start justify-between gap-4">
                <SectionTitle overline="Throughput" title="Review volume"
                  sub="Contracts analyzed vs. clauses escalated to the LLM (demo data)." />
                <div className="flex gap-1 rounded-xl border border-white/10 p-1">
                  {Object.keys(RANGES).map((r) => (
                    <button key={r} onClick={() => setRange(r)}
                      className={`rounded-lg px-3 py-1 text-xs font-medium transition focus:outline-none focus-visible:ring-2 focus-visible:ring-gold-500/60
                        ${range === r ? "bg-gold-500/15 text-gold-300" : "text-zinc-500 hover:text-zinc-200"}`}>{r}</button>
                  ))}
                </div>
              </div>
              <VolumeChart range={range} dark={dark} />
            </Card>
            <Card className="xl:col-span-2">
              <SectionTitle overline="Measured on CUAD" title="Screening recall by category"
                sub="Recall-first thresholds target ≥90% on validation — green bars hit the target on test. Click a bar for the category explainer." />
              <RecallChart dark={dark} selected={selectedCategory} onSelect={openCategory} />
            </Card>
          </section>

          {/* Queue */}
          <section ref={refs.queue} className="scroll-mt-20">
            <Card>
              <SectionTitle overline="Human review" title="Recent findings"
                sub="LLM-verified findings carry a plain-English summary; weak flags the LLM cleared are logged as review noise avoided. Use the header search or category chips to filter." />
              <QueueTable selected={selectedCategory} search={search} onSelectCategory={openCategory} />
            </Card>
          </section>

          <footer className="pb-6 text-center text-[11px] text-zinc-600">
            Lexorion · CUAD-trained hybrid screening — recall 0.904 locally, 4.4% of decisions escalated, $0 marginal cost ·
            <a className="ml-1 text-gold-500 underline decoration-dotted underline-offset-4 hover:text-gold-300" href="https://github.com/sahilshinde-45/Lexorion">GitHub</a>
          </footer>
        </main>
      </div>

      <CategoryModal id={modalCategory} onClose={() => setModalCategory(null)} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
